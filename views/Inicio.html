<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSLOGISTICA - Inicio</title>
    <link rel="stylesheet" href="../styles/styles_principal.css">
    <link rel="stylesheet" href="../styles/icons.css">
    <link rel="stylesheet" href="../styles/principal_styles.css">
    <link rel="stylesheet" href="../styles/inicio_styles.css">
</head>
<body class="bodyPrincipal">
    <!-- OVERLAY PARA MENU -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- SIDEBAR/MENU DESPLEGABLE -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Menú</h2>
            <button class="sidebar-close" id="sidebarClose">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="../views/Inicio.html" class="sidebar-link">Inicio</a>
            </li>
            <li class="sidebar-item">
                <a href="#" class="sidebar-link">Resumen General</a>
            </li>
            <li class="sidebar-item">
                <a href="../views/Viajes.html" class="sidebar-link">Viajes</a>
            </li>
            <li class="sidebar-item" id="sidebarUsuarios" style="display: none;">
                <a href="../views/Usuarios.html" class="sidebar-link">Usuarios</a>
            </li>
            <li class="sidebar-item">
                <a href="#" class="sidebar-link">Configuración</a>
            </li>
        </ul>
    </nav>

    <!-- HEADER -->
    <header class="headerPrincipal">
        <div class="headerContenido">
            <button class="btn-hamburger" id="btnHamburger">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1 class="logoHeader">SATRAP</h1>
            <button class="btnLogout" id="btnLogout">Cerrar Sesión</button>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-wrapper">
        <div class="contenedor-inicio">
            <!-- CARD DE PERFIL -->
            <div class="profile-card">
                <!-- IMAGEN DE PERFIL -->
                <div class="profile-image-container">
                    <img src="../assets/icons/user-profile-default.svg" alt="Foto de perfil" class="profile-image">
                </div>

                <!-- INFORMACIÓN DEL USUARIO -->
                <div class="profile-info">
                    <h2 id="userName" class="profile-name">-</h2>
                    <p id="userDni" class="profile-dni">DNI: -</p>
                </div>

                <!-- DETALLES -->
                <div class="profile-details">
                    <div class="detail-item">
                        <span class="detail-label">Nombre:</span>
                        <span id="detailNombre" class="detail-value">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Apellido:</span>
                        <span id="detailApellido" class="detail-value">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">DNI:</span>
                        <span id="detailDni" class="detail-value">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Rol:</span>
                        <span id="detailRole" class="detail-value detail-role">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Empresa:</span>
                        <span id="detailEmpresa" class="detail-value">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../Scripts/sidebar.js"></script>
    <script src="../Scripts/inicio.js"></script>
</body>
</html>
