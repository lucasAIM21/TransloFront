<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - TRANSLOGISTICA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="bodyLogin">
    <div class="contenedorLogin">
        <div class="cajaLogin">
            <h2>TRANSLOGISTICA</h2>
            <p class="subtituloLogin">Ingresa tus credenciales</p>
            
            <form class="formularioLogin" id="formularioLogin">
                <div class="grupoFormulario">
                    <label for="usuario">Usuario o Email:</label>
                    <input 
                        type="text" 
                        id="usuario" 
                        name="usuario" 
                        placeholder="Ingresa tu usuario o email"
                        required
                    >
                </div>

                <div class="grupoFormulario">
                    <label for="contrasena">Contraseña:</label>
                    <input 
                        type="password" 
                        id="contrasena" 
                        name="contrasena" 
                        placeholder="Ingresa tu contraseña"
                        required
                    >
                </div>

                <div class="recordarMe">
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recuérdame</label>
                </div>

                <div class="btnCentrado">
                    <button type="submit" class="btnLogin" id="btnLogin">Iniciar Sesión</button>
                </div>
            </form>

            <div class="separador">o</div>

            <div class="btnCentrado">
                <button type="button" class="btnRegistro" id="btnRegistro">Crear Cuenta</button>
            </div>

            <p class="enlaceAyuda">
                <a href="#" id="enlaceOlvide">¿Olvidaste tu contraseña?</a>
            </p>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
