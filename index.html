<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - TRANSLOGISTICA</title>
    <link rel="stylesheet" href="styles/styles_principal.css">
    <link rel="stylesheet" href="styles/icons.css">
    <link rel="stylesheet" href="styles/login_styles.css">
</head>
<body class="bodyLogin">
    <div class="contenedorLogin">
        <div class="cajaLogin">
            <h2>TRANSLOGISTICA</h2>
            <p class="subtituloLogin">Ingresa tus credenciales</p>
            
            <form class="formularioLogin" id="formularioLogin">
                <div class="grupoFormulario">
                    <label for="dni">DNI:</label>
                    <input 
                        type="text" 
                        id="dni" 
                        name="dni" 
                        placeholder="Ingresa tu DNI"
                        required
                    >
                </div>

                <div class="grupoFormulario">
                    <label for="contrasena">Contraseña:</label>
                    <input 
                        type="password" 
                        id="contrasena" 
                        name="contrasena" 
                        placeholder="Ingresa tu contraseña"
                        required
                    >
                </div>

                <div class="recordarMe">
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recuérdame</label>
                </div>

                <div class="btnCentrado">
                    <button type="submit" class="btnLogin" id="btnLogin">Iniciar Sesión</button>
                </div>
            </form>

        </div>
    </div>
    
    <script src="./Scripts/login.js"></script>
</body>
</html>
